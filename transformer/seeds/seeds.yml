version: 2

seeds:
  - name: insee_sirene_cat_juridique
    description: >
      The legal category classification used to manage the Sirene directory,
      the official register of companies and establishments.
      (https://www.insee.fr/fr/information/2028129)
    docs:
      node_color: "#9DC183"
    config:
      tags: "seeds"
    columns:
      - name: code
        description: Legal category code.
      - name: libelle
        description: Legal category label.
      - name: type
        description: Legal type hierarchy level.
  - name: insee_sirene_naf
    description: >
      The French activity classification revision 2 (NAF rev. 2, 2008) is the
      national statistical classification of activities.
      (https://www.insee.fr/fr/information/2120875)
    docs:
      node_color: "#9DC183"
    config:
      tags: "seeds"
    columns:
      - name: code
        description: Classification code.
      - name: libelle
        description: Classification label.
      - name: niveau
        description: Classification hierarchy level, such as sections or divisions.
  - name: nom_activite_artisanat
    description: >
      The French activity classification for craft trades (NAFA) describes
      craft-sector activities.
      (https://data.artisanat.fr/nafa/)
    docs:
      node_color: "#9DC183"
    config:
      tags: "seeds"
    columns:
      - name: code
        description: NAFA code.
      - name: libelle
        description: NAFA label.

  - name: ministere_culture_division
    description: >
      Regional divisions of the Ministère de la Culture.
    docs:
      node_color: "#9DC183"
    config:
      tags: "seeds"
      column_types:
        type_division: varchar
        nom_division: varchar
        siret: varchar
    columns:
      - name: type_division
        description: >
          Division type - AC (Administration Centrale) or DRAC (Direction
          Régionale des Affaires Culturelles) for regional divisions.
      - name: nom_division
        description: Name of the division - "Administration Centrale" or the region name.
      - name: siret
        description: >
          SIRET identifier of the division. Empty for Nouvelle-Calédonie,
          Saint-Pierre-et-Miquelon, Polynésie française, and Wallis-et-Futuna.

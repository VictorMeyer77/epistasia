version: 2

sources:
  - name: raw
    description: Raw files from downloader.
    tables:
      - name: commande_publique_marche
        description: >
          Raw French public procurement contract notices. Contains market
          identifiers, buyer information, procedure details, execution
          location, pricing, awardees, social and environmental considerations,
          and publication metadata.
        meta:
          external_location: "../datalake/raw/commande-publique-marche_*.parquet"
        columns:
          - name: id
            description: Unique identifier of the public procurement contract notice.
          - name: acheteur
            description: Buyer information, including the buyer identifier.
          - name: nature
            description: Nature of the procurement contract.
          - name: objet
            description: Object or subject of the procurement contract.
          - name: codeCPV
            description: Common Procurement Vocabulary code describing the purchase.
          - name: techniques
            description: Procurement techniques used for the contract.
          - name: modalitesExecution
            description: Execution modalities attached to the contract.
          - name: ccag
            description: Applicable general administrative clauses reference.
          - name: offresRecues
            description: Number of offers received, as reported in the source data.
          - name: tauxAvance
            description: Advance payment rate for the contract.
          - name: typeGroupementOperateurs
            description: Type of economic operator grouping.
          - name: procedure
            description: Procurement procedure used for the contract.
          - name: lieuExecution
            description: Execution location, including location code and code type.
          - name: dureeMois
            description: Contract duration in months.
          - name: dateNotification
            description: Contract notification date.
          - name: datePublicationDonnees
            description: Data publication date for the contract notice.
          - name: montant
            description: Contract amount.
          - name: typesPrix
            description: Price type or types attached to the contract.
          - name: formePrix
            description: Price form used for the contract.
          - name: origineUE
            description: Share or amount of contract origin from the European Union.
          - name: origineFrance
            description: Share or amount of contract origin from France.
          - name: titulaires
            description: Awardee information, including identifier type and identifier.
          - name: considerationsSociales
            description: Social considerations attached to the contract.
          - name: considerationsEnvironnementales
            description: Environmental considerations attached to the contract.
          - name: source
            description: Source system or publisher of the contract data.
          - name: marcheInnovant
            description: Flag indicating whether the contract is considered innovative.
          - name: attributionAvance
            description: Flag indicating whether an advance payment was awarded.
          - name: sousTraitanceDeclaree
            description: Flag indicating whether subcontracting was declared.
          - name: idAccordCadre
            description: Identifier of the related framework agreement, when applicable.

      - name: commande_publique_concession
        description: >
          Raw French public procurement concession notices. Contains concession
          identifiers, nature, object, procedure details, execution dates, financial
          values, concessionaires, social and environmental considerations, and
          publication metadata.
        meta:
          external_location: "../datalake/raw/commande-publique-concession_*.parquet"
        columns:
          - name: id
            description: Unique identifier of the public procurement concession notice.
          - name: nature
            description: Nature of the concession contract.
          - name: objet
            description: Object or subject of the concession contract.
          - name: tauxAvance
            description: Advance payment rate for the concession.
          - name: procedure
            description: Procurement procedure used for the concession.
          - name: dureeMois
            description: Contract duration in months.
          - name: datePublicationDonnees
            description: Data publication date for the concession notice.
          - name: origineUE
            description: Share or amount of concession origin from the European Union.
          - name: origineFrance
            description: Share or amount of concession origin from France.
          - name: titulaires
            description: Awardee information, including identifier type and identifier.
          - name: considerationsSociales
            description: Social considerations attached to the concession.
          - name: considerationsEnvironnementales
            description: Environmental considerations attached to the concession.
          - name: source
            description: Source system or publisher of the concession data.
          - name: autoriteConcedante
            description: Granting authority information for the concession.
          - name: dateSignature
            description: Signature date of the concession contract.
          - name: dateDebutExecution
            description: Start date of concession execution.
          - name: valeurGlobale
            description: Global value of the concession.
          - name: montantSubventionPublique
            description: Amount of public subsidy for the concession.
          - name: concessionnaires
            description: Concessionaire information, including identifier type and identifier.
          - name: donneesExecution
            description: Execution data for the concession.
          - name: modifications
            description: Modifications to the concession contract.

      - name: sirene_unite_legale
        description: >
          Raw Sirene stock legal units file from INSEE/data.gouv.fr. Contains
          one row per legal unit identified by a SIREN, with identity,
          administrative status, activity, legal category, workforce, and head
          office establishment fields.
        meta:
          external_location: "../datalake/raw/sirene-unite-legal_*.parquet"
        columns:
          - name: siren
            description: >
              SIREN identifier of the legal unit. This is the nine-digit
              identifier assigned by INSEE to a company or individual business.
          - name: statutDiffusionUniteLegale
            description: >
              Dissemination status of the legal unit. A partial dissemination
              status indicates that some personal or address data may be masked.
          - name: unitePurgeeUniteLegale
            description: Flag indicating whether the legal unit has been purged.
          - name: dateCreationUniteLegale
            description: Creation date of the legal unit in the Sirene registry.
          - name: sigleUniteLegale
            description: Acronym or short name used by the legal unit.
          - name: sexeUniteLegale
            description: >
              Sex of the natural person when the legal unit is an individual.
          - name: prenom1UniteLegale
            description: First given name of the natural person legal unit.
          - name: prenom2UniteLegale
            description: Second given name of the natural person legal unit.
          - name: prenom3UniteLegale
            description: Third given name of the natural person legal unit.
          - name: prenom4UniteLegale
            description: Fourth given name of the natural person legal unit.
          - name: prenomUsuelUniteLegale
            description: Usual given name of the natural person legal unit.
          - name: pseudonymeUniteLegale
            description: Pseudonym of the natural person legal unit.
          - name: identifiantAssociationUniteLegale
            description: >
              Association identifier for legal units registered as associations.
          - name: trancheEffectifsUniteLegale
            description: Workforce size band of the legal unit.
          - name: anneeEffectifsUniteLegale
            description: Reference year for the legal unit workforce size band.
          - name: dateDernierTraitementUniteLegale
            description: >
              Date and time of the latest Sirene processing for the legal unit.
          - name: nombrePeriodesUniteLegale
            description: Number of historical periods associated with the legal unit.
          - name: categorieEntreprise
            description: >
              Enterprise category of the legal unit, such as SME or large
              enterprise.
          - name: anneeCategorieEntreprise
            description: Reference year for the enterprise category.
          - name: dateDebut
            description: Start date of the current legal unit period.
          - name: etatAdministratifUniteLegale
            description: Administrative status of the legal unit.
          - name: nomUniteLegale
            description: Birth name or family name of the natural person legal unit.
          - name: nomUsageUniteLegale
            description: Usage name of the natural person legal unit.
          - name: denominationUniteLegale
            description: Registered corporate name of the legal unit.
          - name: denominationUsuelle1UniteLegale
            description: First usual trading name of the legal unit.
          - name: denominationUsuelle2UniteLegale
            description: Second usual trading name of the legal unit.
          - name: denominationUsuelle3UniteLegale
            description: Third usual trading name of the legal unit.
          - name: categorieJuridiqueUniteLegale
            description: Legal category code of the legal unit.
          - name: activitePrincipaleUniteLegale
            description: Principal activity code of the legal unit.
          - name: nomenclatureActivitePrincipaleUniteLegale
            description: Activity classification used for the principal activity code.
          - name: nicSiegeUniteLegale
            description: NIC code of the legal unit head office establishment.
          - name: economieSocialeSolidaireUniteLegale
            description: >
              Flag indicating whether the legal unit belongs to the social and
              solidarity economy.
          - name: societeMissionUniteLegale
            description: >
              Flag indicating whether the legal unit is a mission-driven company.
          - name: caractereEmployeurUniteLegale
            description: Flag indicating whether the legal unit has employer status.
          - name: activitePrincipaleNAF25UniteLegale
            description: >
              Future principal activity code in the NAF 2025 classification,
              distributed in anticipation of the NAF 2025 transition.

      - name: sirene_etablissement
        description: >
          Raw Sirene stock establishments file from INSEE/data.gouv.fr. Contains
          one row per establishment identified by a SIRET, with address,
          administrative status, activity, workforce, head-office flag, and
          employer fields.
        meta:
          external_location: "../datalake/raw/sirene-etablissement_*.parquet"
        columns:
          - name: siren
            description: >
              SIREN identifier of the legal unit that owns the establishment.
          - name: nic
            description: >
              Internal establishment classification number identifying the
              establishment within its legal unit.
          - name: siret
            description: >
              SIRET identifier of the establishment, composed of the SIREN and
              NIC.
          - name: statutDiffusionEtablissement
            description: >
              Dissemination status of the establishment. A partial dissemination
              status indicates that some address or personal data may be masked.
          - name: dateCreationEtablissement
            description: Creation date of the establishment in the Sirene registry.
          - name: trancheEffectifsEtablissement
            description: Workforce size band of the establishment.
          - name: anneeEffectifsEtablissement
            description: Reference year for the establishment workforce size band.
          - name: activitePrincipaleRegistreMetiersEtablissement
            description: >
              Principal activity recorded in the trades register for the
              establishment.
          - name: dateDernierTraitementEtablissement
            description: >
              Date and time of the latest Sirene processing for the
              establishment.
          - name: etablissementSiege
            description: Flag indicating whether the establishment is the legal-unit head office.
          - name: nombrePeriodesEtablissement
            description: Number of historical periods associated with the establishment.
          - name: complementAdresseEtablissement
            description: Additional address information for the establishment.
          - name: numeroVoieEtablissement
            description: Street number of the establishment address.
          - name: indiceRepetitionEtablissement
            description: Repetition index for the establishment street number.
          - name: dernierNumeroVoieEtablissement
            description: Last street number when the establishment address uses a range.
          - name: indiceRepetitionDernierNumeroVoieEtablissement
            description: >
              Repetition index for the last street number when the establishment
              address uses a range.
          - name: typeVoieEtablissement
            description: Street type of the establishment address.
          - name: libelleVoieEtablissement
            description: Street name of the establishment address.
          - name: codePostalEtablissement
            description: Postal code of the establishment address.
          - name: libelleCommuneEtablissement
            description: Commune name of the establishment address.
          - name: libelleCommuneEtrangerEtablissement
            description: Foreign commune name of the establishment address.
          - name: distributionSpecialeEtablissement
            description: Special delivery information for the establishment address.
          - name: codeCommuneEtablissement
            description: Official commune code of the establishment address.
          - name: codeCedexEtablissement
            description: CEDEX code of the establishment address.
          - name: libelleCedexEtablissement
            description: CEDEX label of the establishment address.
          - name: codePaysEtrangerEtablissement
            description: Foreign country code of the establishment address.
          - name: libellePaysEtrangerEtablissement
            description: Foreign country name of the establishment address.
          - name: identifiantAdresseEtablissement
            description: Address identifier of the establishment.
          - name: coordonneeLambertAbscisseEtablissement
            description: Lambert projected X coordinate of the establishment address.
          - name: coordonneeLambertOrdonneeEtablissement
            description: Lambert projected Y coordinate of the establishment address.
          - name: complementAdresse2Etablissement
            description: Additional information for the secondary establishment address.
          - name: numeroVoie2Etablissement
            description: Street number of the secondary establishment address.
          - name: indiceRepetition2Etablissement
            description: Repetition index for the secondary address street number.
          - name: typeVoie2Etablissement
            description: Street type of the secondary establishment address.
          - name: libelleVoie2Etablissement
            description: Street name of the secondary establishment address.
          - name: codePostal2Etablissement
            description: Postal code of the secondary establishment address.
          - name: libelleCommune2Etablissement
            description: Commune name of the secondary establishment address.
          - name: libelleCommuneEtranger2Etablissement
            description: Foreign commune name of the secondary establishment address.
          - name: distributionSpeciale2Etablissement
            description: Special delivery information for the secondary address.
          - name: codeCommune2Etablissement
            description: Official commune code of the secondary establishment address.
          - name: codeCedex2Etablissement
            description: CEDEX code of the secondary establishment address.
          - name: libelleCedex2Etablissement
            description: CEDEX label of the secondary establishment address.
          - name: codePaysEtranger2Etablissement
            description: Foreign country code of the secondary establishment address.
          - name: libellePaysEtranger2Etablissement
            description: Foreign country name of the secondary establishment address.
          - name: dateDebut
            description: Start date of the current establishment period.
          - name: etatAdministratifEtablissement
            description: Administrative status of the establishment.
          - name: enseigne1Etablissement
            description: First trade sign or commercial name of the establishment.
          - name: enseigne2Etablissement
            description: Second trade sign or commercial name of the establishment.
          - name: enseigne3Etablissement
            description: Third trade sign or commercial name of the establishment.
          - name: denominationUsuelleEtablissement
            description: Usual denomination of the establishment.
          - name: activitePrincipaleEtablissement
            description: Principal activity code of the establishment.
          - name: nomenclatureActivitePrincipaleEtablissement
            description: Activity classification used for the establishment activity code.
          - name: caractereEmployeurEtablissement
            description: Flag indicating whether the establishment has employer status.
          - name: activitePrincipaleNAF25Etablissement
            description: >
              Future principal activity code in the NAF 2025 classification,
              distributed in anticipation of the NAF 2025 transition.

      - name: france_communes
        description: >
          Raw INSEE COG communes file. Contains communes, municipal
          arrondissements, delegated communes, and associated communes, with
          higher-level geographic codes such as canton, department, and region.
        meta:
          external_location: "../datalake/raw/communes-france_*.csv"
        columns:
          - name: TYPECOM
            description: Type of commune or commune-like administrative entity.
          - name: COM
            description: Official commune code.
          - name: REG
            description: Region code.
          - name: DEP
            description: Department code.
          - name: CTCD
            description: Code of the territorial authority with departmental powers.
          - name: ARR
            description: Arrondissement code.
          - name: TNCC
            description: Type of name in clear text.
          - name: NCC
            description: Name in clear text, uppercase.
          - name: NCCENR
            description: Name in clear text with rich typography.
          - name: LIBELLE
            description: Name in clear text with rich typography and article.
          - name: CAN
            description: >
              Canton code. For multi-canton communes, INSEE uses pseudo-canton
              codes from 99 to 90 or new commune codes from 89 to 80.
          - name: COMPARENT
            description: >
              Parent commune code for municipal arrondissements and associated
              or delegated communes.
      - name: france_departements
        description: Raw INSEE COG departments file.
        meta:
          external_location: "../datalake/raw/departements-france_*.csv"
        columns:
          - name: DEP
            description: Department code.
          - name: REG
            description: Region code.
          - name: CHEFLIEU
            description: Official commune code of the department capital.
          - name: TNCC
            description: Type of name in clear text.
          - name: NCC
            description: Name in clear text, uppercase.
          - name: NCCENR
            description: Name in clear text with rich typography.
          - name: LIBELLE
            description: Name in clear text with rich typography and article.
      - name: france_regions
        description: Raw INSEE COG regions file.
        meta:
          external_location: "../datalake/raw/regions-france_*.csv"
        columns:
          - name: REG
            description: Region code.
          - name: CHEFLIEU
            description: Official commune code of the region capital.
          - name: TNCC
            description: Type of name in clear text.
          - name: NCC
            description: Name in clear text, uppercase.
          - name: NCCENR
            description: Name in clear text with rich typography.
          - name: LIBELLE
            description: Name in clear text with rich typography and article.
      - name: culture_convention_subvention
        description: >
          Essential data on subsidy conventions from the French Ministry of Culture. Contains all ministerial program data including
          year, credit origin, beneficiary information, geographic details, financial data, and administrative classifications.
          (https://www.data.gouv.fr/datasets/donnees-essentielles-des-conventions-de-subvention-5)
        meta:
          external_location: "read_csv('../datalake/raw/culture-convention-subvention_*.csv', delim=';', encoding='latin-1', all_varchar=true, header=true)"
        columns:
          - name: Année
            description: Year of the subsidy convention.
          - name: Origine des crédits
            description: Origin of the credits.
          - name: Détail origine des crédits
            description: Detailed origin of the credits.
          - name: CPER
            description: State-Region Plan Contract identifier.
          - name: Montant engagé
            description: Committed amount for the subsidy.
          - name: Nom du bénéficiaire
            description: Name of the beneficiary.
          - name: Région du bénéficiaire
            description: Region of the beneficiary.
          - name: Département du bénéficiaire
            description: Department of the beneficiary.
          - name: EPCI du bénéficiaire
            description: Public establishment of inter-municipal cooperation of the beneficiary.
          - name: Sous-types de communes du bénéficiaire
            description: Sub-types of communes for the beneficiary.
          - name: Code postal du bénéficiaire
            description: Postal code of the beneficiary.
          - name: Code commune du bénéficiaire
            description: Commune code of the beneficiary.
          - name: Commune du bénéficiaire
            description: Commune name of the beneficiary.
          - name: N° SIREN du bénéficiaire
            description: SIREN number of the beneficiary.
          - name: N° SIRET du bénéficiaire
            description: SIRET number of the beneficiary.
          - name: N° EJ
            description: EJ number.
          - name: Titre
            description: Title.
          - name: Mission
            description: Mission.
          - name: Programme
            description: Program.
          - name: Localisation interministérielle
            description: Inter-ministerial location.
          - name: Fonctionnement/Investissement
            description: Operating/Investment classification.
          - name: Domaine fonctionnel
            description: Functional domain.
          - name: Compte budgétaire
            description: Budget account.
          - name: Code activité
            description: Activity code.
          - name: Activité libellé long
            description: Activity label long form.
          - name: Activité libellé court
            description: Activity label short form.
          - name: Centre financier
            description: Financial center.
          - name: Centre de coût
            description: Cost center.
          - name: Appellation unité patrimoniale concernée par l'op. fin.
            description: Name of the patrimonial unit concerned by the financial operation.
          - name: Région unité patrimoniale concernée par l'op. fin.
            description: Region of the patrimonial unit concerned by the financial operation.
          - name: Département unité patrimoniale concernée par l'op. fin.
            description: Department of the patrimonial unit concerned by the financial operation.
          - name: Code postal unité patrimoniale concernée par l'op. fin.
            description: Postal code of the patrimonial unit concerned by the financial operation.
          - name: Code commune unité patrimoniale concernée par l'op. fin.
            description: Commune code of the patrimonial unit concerned by the financial operation.
          - name: Commune unité patrimoniale concernée par l'op. fin.
            description: Commune of the patrimonial unit concerned by the financial operation.
      - name: agriculture_subvention
        description: >
          Essential data on subsidy conventions exceeding €23,000 awarded by the French Ministry of Agriculture and Food.
          Contains information on the awarding authority, beneficiary identification,
          convention dates, financial amounts, payment conditions, and administrative
          metadata for grants subject to the French open data transparency requirements.
          (https://www.data.gouv.fr/datasets/subventions-de-plus-de-23-000-euros-attribuees-par-le-ministere-de-lagriculture)
        meta:
          external_location: "read_csv('../datalake/raw/agriculture-subvention_*.csv', delim=';', encoding='cp1252', header=true, skip=2)"
        columns:
          - name: Nom attributaire*
            description: Name of the authority awarding the subsidy.
          - name: Identification de l'attributaire*
            description: SIRET identifier of the awarding authority.
          - name: Date de convention*
            description: Date the subsidy convention was signed.
          - name: Référence de la décision
            description: Reference number of the administrative decision granting the subsidy.
          - name: Identification du bénéficiaire*
            description: SIRET identifier of the beneficiary.
          - name: Nom du bénéficiaire*
            description: Name of the beneficiary receiving the subsidy.
          - name: Objet de la convention
            description: Purpose or subject of the subsidy convention.
          - name: Montant total de la subvention*
            description: Total amount of the subsidy awarded.
          - name: Nature de la subvention*
            description: Nature or type of the subsidy (e.g. financial grant).
          - name: Conditions de versement*
            description: Payment conditions for the subsidy (e.g. one-time or installment payments).
          - name: Date de versement
            description: Date or period during which the subsidy payments were made.
          - name: Numéro de référencement au répertoire des entreprises
            description: Enterprise register reference number, when available.
          - name: Aide notifiée à l'Europe
            description: Indicates whether the subsidy was notified to the European Commission as State aid.
          - name: Pourcentage du montant de la subvention attribué au bénéficiaire*
            description: Percentage of the total subsidy amount allocated to the beneficiary.
      - name: anct_subvention_ville
        description: >
          Essential data on grants awarded by the French National Agency for Territorial Cohesion (ANCT)
          under the Urban Policy (Politique de la Ville). Contains information on the awarding authority,
          departmental directorate, beneficiary identification, grant purpose, financial amounts,
          payment conditions, and European state aid notification status.
          (https://www.data.gouv.fr/datasets/subventions-politique-de-la-ville)
        meta:
          external_location: "read_csv('../datalake/raw/anct-subvention-ville-*.csv', delim=';', encoding='cp1252', header=true, all_varchar=true, union_by_name=true)"
        columns:
          - name: Nom de l'attribuant
            description: Name of the authority awarding the grant.
          - name: Code département/Direction
            description: Code of the department or directorate responsible for the grant.
          - name: Libellé département/Direction
            description: Name of the department or directorate responsible for the grant.
          - name: Identification de l'attributaire
            description: SIRET identifier of the awarding authority.
          - name: Référence de la décision
            description: Administrative decision reference for the grant.
          - name: Identification du bénéficiaire
            description: SIRET identifier of the beneficiary.
          - name: Nom du bénéficiaire
            description: Name of the beneficiary receiving the grant.
          - name: Objet de la subvention
            description: Purpose or subject of the grant.
          - name: Montant total de la subvention
            description: Total amount of the grant awarded.
          - name: Nature de la subvention
            description: Nature or type of the grant.
          - name: Conditions de versement
            description: Conditions governing payment of the grant.
          - name: Date de versement
            description: Scheduled or actual payment date of the grant.
          - name: RAE
            description: Enterprise register reference, when available.
          - name: notificationUE
            description: Indicates whether the grant was notified to the European Commission as State aid.
          - name: PourcentageSubvention
            description: Percentage of the total grant amount allocated to the beneficiary.
      - name: ademe_aide_financiere
        description: >
          Essential data on financial aids awarded by the French Agency for Ecological Transition (ADEME).
          Contains information on the awarding authority, beneficiary identification, aid purpose,
          aid schemes, financial amounts, payment conditions, payment periods, and European state aid
          notification status.
          (https://www.data.gouv.fr/datasets/les-aides-financieres-de-lademe-1)
        meta:
          external_location: "../datalake/raw/ademe-aide-financiere_*.csv"
        columns:
          - name: Nom de l attribuant
            description: Name of the authority awarding the financial aid.
          - name: idAttribuant
            description: SIRET identifier of the awarding authority.
          - name: dateConvention
            description: Date on which the aid agreement was signed.
          - name: referenceDecision
            description: Administrative decision reference associated with the aid.
          - name: nomBeneficiaire
            description: Name of the beneficiary receiving the aid.
          - name: idBeneficiaire
            description: SIRET identifier of the beneficiary.
          - name: objet
            description: Purpose or description of the financial aid.
          - name: dispositifAide
            description: Aid scheme or support program associated with the financial aid.
          - name: montant
            description: Total amount of the financial aid awarded.
          - name: nature
            description: Nature or type of the aid.
          - name: conditionsVersement
            description: Conditions governing payment of the aid.
          - name: datesPeriodeVersement
            description: Payment date or payment period of the aid.
          - name: idRAE
            description: Enterprise register reference identifier, when available.
          - name: notificationUE
            description: Indicates whether the aid was notified to the European Commission as State aid.
      - name: dotation_soutien_territoire
        description: >
          Essential data on investment projects financed by French State investment support grants
          for local authorities. Contains information on funding schemes, budget programs,
          beneficiary identification, project descriptions, investment costs, subsidy amounts,
          and funding rates.
          (https://www.data.gouv.fr/datasets/projets-finances-par-les-dotations-de-soutien-a-linvestissement-des-collectivites-territoriales)
        meta:
          external_location: "read_csv('../datalake/raw/dotation-soutien-territoire-*.csv', delim=';', header=true, all_varchar=true, union_by_name=true)"
        columns:
          - name: exercice
            description: Fiscal year of the awarded subsidy.
          - name: dispositif
            description: State investment support scheme under which the project was funded.
          - name: programme
            description: Budget program associated with the funding.
          - name: beneficiaire_type
            description: Type of beneficiary (e.g. municipality, EPCI).
          - name: beneficiaire_siren

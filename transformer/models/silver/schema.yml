version: 2

models:
  - name: svr_france_communes
    description: >
      Silver INSEE COG communes dataset for the latest available release year.
      Standardizes raw COG commune columns into analytics-friendly names.
    data_tests:
      - unique:
          column_name: "code_commune || '-' || type_commune"
    columns:
      - name: type_commune
        description: Type of commune or commune-like administrative entity.
        tests:
          - not_null
      - name: code_commune
        description: Official commune code.
        tests:
          - not_null
      - name: code_reg
        description: Region code.
      - name: code_dep
        description: Department code.
      - name: code_collectivite_territorial
        description: Code of the territorial authority with departmental powers.
      - name: arrondissement
        description: Arrondissement code.
      - name: type_name_format
        description: Type of name in clear text.
      - name: name_commune_uppercase
        description: Commune name in clear text, uppercase.
      - name: name_commune_typo_enriched
        description: Commune name in clear text with rich typography.
      - name: name_commune
        description: Commune name in clear text with rich typography and article.
      - name: canton_code
        description: >
          Canton code. For multi-canton communes, INSEE uses pseudo-canton
          codes from 99 to 90 or new commune codes from 89 to 80.
      - name: parent_code_commune
        description: >
          Parent commune code for municipal arrondissements and associated or
          delegated communes.
      - name: release_year
        description: Source file release year retained in the silver dataset.

  - name: svr_france_departements
    description: >
      Silver INSEE COG departments dataset for the latest available release
      year. Standardizes raw COG department columns into analytics-friendly
      names.
    columns:
      - name: code_dep
        description: Department code.
        tests:
          - unique
          - not_null
      - name: code_reg
        description: Region code.
      - name: code_commune_prefecture
        description: Official commune code of the department capital.
      - name: type_name_format
        description: Type of name in clear text.
      - name: name_dep_uppercase
        description: Department name in clear text, uppercase.
      - name: name_dep_typo_enriched
        description: Department name in clear text with rich typography.
      - name: name_dep
        description: Department name in clear text with rich typography and article.
      - name: release_year
        description: Source file release year retained in the silver dataset.

  - name: svr_france_regions
    description: >
      Silver INSEE COG regions dataset for the latest available release year.
      Standardizes raw COG region columns into analytics-friendly names.
    columns:
      - name: code_reg
        description: Region code.
        tests:
          - unique
          - not_null
      - name: code_commune_cheflieu
        description: Official commune code of the region capital.
      - name: type_name_format
        description: Type of name in clear text.
      - name: name_reg_uppercase
        description: Region name in clear text, uppercase.
      - name: name_reg_typo_enriched
        description: Region name in clear text with rich typography.
      - name: name_reg
        description: Region name in clear text with rich typography and article.
      - name: release_year
        description: Source file release year retained in the silver dataset.

  - name: svr_sirene_unite_legale
    description: >
      Silver Sirene legal units dataset for the latest available release year.
      Standardizes raw Sirene legal-unit columns into lower snake_case names.
    columns:
      - name: siren
        description: >
          SIREN identifier of the legal unit. This is the nine-digit identifier
          assigned by INSEE to a company or individual business.
        tests:
          - unique
          - not_null
      - name: statut_diffusion_unite_legale
        description: >
          Dissemination status of the legal unit. A partial dissemination status
          indicates that some personal or address data may be masked.
      - name: unite_purgee_unite_legale
        description: Flag indicating whether the legal unit has been purged.
      - name: date_creation_unite_legale
        description: Creation date of the legal unit in the Sirene registry.
      - name: sigle_unite_legale
        description: Acronym or short name used by the legal unit.
      - name: sexe_unite_legale
        description: Sex of the natural person when the legal unit is an individual.
      - name: prenom1_unite_legale
        description: First given name of the natural person legal unit.
      - name: prenom2_unite_legale
        description: Second given name of the natural person legal unit.
      - name: prenom3_unite_legale
        description: Third given name of the natural person legal unit.
      - name: prenom4_unite_legale
        description: Fourth given name of the natural person legal unit.
      - name: prenom_usuel_unite_legale
        description: Usual given name of the natural person legal unit.
      - name: pseudonyme_unite_legale
        description: Pseudonym of the natural person legal unit.
      - name: identifiant_association_unite_legale
        description: Association identifier for legal units registered as associations.
      - name: tranche_effectifs_unite_legale
        description: Workforce size band of the legal unit.
      - name: annee_effectifs_unite_legale
        description: Reference year for the legal unit workforce size band.
      - name: date_dernier_traitement_unite_legale
        description: Date and time of the latest Sirene processing for the legal unit.
      - name: nombre_periodes_unite_legale
        description: Number of historical periods associated with the legal unit.
      - name: categorie_entreprise
        description: Enterprise category of the legal unit, such as SME or large enterprise.
      - name: annee_categorie_entreprise
        description: Reference year for the enterprise category.
      - name: date_debut
        description: Start date of the current legal unit period.
      - name: etat_administratif_unite_legale
        description: Administrative status of the legal unit.
      - name: nom_unite_legale
        description: Birth name or family name of the natural person legal unit.
      - name: nom_usage_unite_legale
        description: Usage name of the natural person legal unit.
      - name: denomination_unite_legale
        description: Registered corporate name of the legal unit.
      - name: denomination_usuelle1_unite_legale
        description: First usual trading name of the legal unit.
      - name: denomination_usuelle2_unite_legale
        description: Second usual trading name of the legal unit.
      - name: denomination_usuelle3_unite_legale
        description: Third usual trading name of the legal unit.
      - name: categorie_juridique_unite_legale
        description: Legal category code of the legal unit.
      - name: activite_principale_unite_legale
        description: Principal activity code of the legal unit.
      - name: nomenclature_activite_principale_unite_legale
        description: Activity classification used for the principal activity code.
      - name: nic_siege_unite_legale
        description: NIC code of the legal unit head office establishment.
      - name: economie_sociale_solidaire_unite_legale
        description: >
          Flag indicating whether the legal unit belongs to the social and
          solidarity economy.
      - name: societe_mission_unite_legale
        description: Flag indicating whether the legal unit is a mission-driven company.
      - name: caractere_employeur_unite_legale
        description: Flag indicating whether the legal unit has employer status.
      - name: activite_principale_naf25_unite_legale
        description: >
          Future principal activity code in the NAF 2025 classification,
          distributed in anticipation of the NAF 2025 transition.
      - name: release_year
        description: Source file release year retained in the silver dataset.

  - name: svr_sirene_etablissement
    description: >
      Silver Sirene establishments dataset for the latest available release
      year. Standardizes raw Sirene establishment columns into lower snake_case
      names.
    columns:
      - name: siren
        description: SIREN identifier of the legal unit that owns the establishment.
        tests:
          - not_null
      - name: nic
        description: >
          Internal establishment classification number identifying the
          establishment within its legal unit.
        tests:
          - not_null
      - name: siret
        description: >
          SIRET identifier of the establishment, composed of the SIREN and NIC.
        tests:
          - unique
          - not_null
      - name: statut_diffusion_etablissement
        description: >
          Dissemination status of the establishment. A partial dissemination
          status indicates that some address or personal data may be masked.
      - name: date_creation_etablissement
        description: Creation date of the establishment in the Sirene registry.
      - name: tranche_effectifs_etablissement
        description: Workforce size band of the establishment.
      - name: annee_effectifs_etablissement
        description: Reference year for the establishment workforce size band.
      - name: activite_principale_registre_metiers_etablissement
        description: >
          Principal activity recorded in the trades register for the
          establishment.
      - name: date_dernier_traitement_etablissement
        description: >
          Date and time of the latest Sirene processing for the establishment.
      - name: etablissement_siege
        description: Flag indicating whether the establishment is the legal-unit head office.
      - name: nombre_periodes_etablissement
        description: Number of historical periods associated with the establishment.
      - name: complement_adresse_etablissement
        description: Additional address information for the establishment.
      - name: numero_voie_etablissement
        description: Street number of the establishment address.
      - name: indice_repetition_etablissement
        description: Repetition index for the establishment street number.
      - name: dernier_numero_voie_etablissement
        description: Last street number when the establishment address uses a range.
      - name: indice_repetition_dernier_numero_voie_etablissement
        description: >
          Repetition index for the last street number when the establishment
          address uses a range.
      - name: type_voie_etablissement
        description: Street type of the establishment address.
      - name: libelle_voie_etablissement
        description: Street name of the establishment address.
      - name: code_postal_etablissement
        description: Postal code of the establishment address.
      - name: libelle_commune_etablissement
        description: Commune name of the establishment address.
      - name: libelle_commune_etranger_etablissement
        description: Foreign commune name of the establishment address.
      - name: distribution_speciale_etablissement
        description: Special delivery information for the establishment address.
      - name: code_commune_etablissement
        description: Official commune code of the establishment address.
      - name: code_cedex_etablissement
        description: CEDEX code of the establishment address.
      - name: libelle_cedex_etablissement
        description: CEDEX label of the establishment address.
      - name: code_pays_etranger_etablissement
        description: Foreign country code of the establishment address.
      - name: libelle_pays_etranger_etablissement
        description: Foreign country name of the establishment address.
      - name: identifiant_adresse_etablissement
        description: Address identifier of the establishment.
      - name: coordonnee_lambert_abscisse_etablissement
        description: Lambert projected X coordinate of the establishment address.
      - name: coordonnee_lambert_ordonnee_etablissement
        description: Lambert projected Y coordinate of the establishment address.
      - name: complement_adresse2_etablissement
        description: Additional information for the secondary establishment address.
      - name: numero_voie2_etablissement
        description: Street number of the secondary establishment address.
      - name: indice_repetition2_etablissement
        description: Repetition index for the secondary address street number.
      - name: type_voie2_etablissement
        description: Street type of the secondary establishment address.
      - name: libelle_voie2_etablissement
        description: Street name of the secondary establishment address.
      - name: code_postal2_etablissement
        description: Postal code of the secondary establishment address.
      - name: libelle_commune2_etablissement
        description: Commune name of the secondary establishment address.
      - name: libelle_commune_etranger2_etablissement
        description: Foreign commune name of the secondary establishment address.
      - name: distribution_speciale2_etablissement
        description: Special delivery information for the secondary address.
      - name: code_commune2_etablissement
        description: Official commune code of the secondary establishment address.
      - name: code_cedex2_etablissement
        description: CEDEX code of the secondary establishment address.
      - name: libelle_cedex2_etablissement
        description: CEDEX label of the secondary establishment address.
      - name: code_pays_etranger2_etablissement
        description: Foreign country code of the secondary establishment address.
      - name: libelle_pays_etranger2_etablissement
        description: Foreign country name of the secondary establishment address.
      - name: date_debut
        description: Start date of the current establishment period.
      - name: etat_administratif_etablissement
        description: Administrative status of the establishment.
      - name: enseigne1_etablissement
        description: First trade sign or commercial name of the establishment.
      - name: enseigne2_etablissement
        description: Second trade sign or commercial name of the establishment.
      - name: enseigne3_etablissement
        description: Third trade sign or commercial name of the establishment.
      - name: denomination_usuelle_etablissement
        description: Usual denomination of the establishment.
      - name: activite_principale_etablissement
        description: Principal activity code of the establishment.
      - name: nomenclature_activite_principale_etablissement
        description: Activity classification used for the establishment activity code.
      - name: caractere_employeur_etablissement
        description: Flag indicating whether the establishment has employer status.
      - name: activite_principale_naf25_etablissement
        description: >
          Future principal activity code in the NAF 2025 classification,
          distributed in anticipation of the NAF 2025 transition.
      - name: release_year
        description: Source file release year retained in the silver dataset.

  - name: svr_ent_sirene_unite_legale
    description: >
      Enterprise-oriented Sirene legal units dataset for the latest available
      release year. Enriches silver legal-unit records with NAF activity labels
      and INSEE legal category labels.
    columns:
      - name: siren
        description: >
          SIREN identifier of the legal unit. This is the nine-digit identifier
          assigned by INSEE to a company or individual business.
        tests:
          - unique
          - not_null
      - name: statut_diffusion_unite_legale
        description: >
          Dissemination status of the legal unit. A partial dissemination status
          indicates that some personal or address data may be masked.
      - name: unite_purgee_unite_legale
        description: Flag indicating whether the legal unit has been purged.
      - name: date_creation_unite_legale
        description: Creation date of the legal unit in the Sirene registry.
      - name: denomination_unite_legal
        description: >
          Display name of the legal unit. Uses the registered denomination when
          available, otherwise falls back to the usual given name and family
          name for natural-person legal units.
      - name: identifiant_association_unite_legale
        description: Association identifier for legal units registered as associations.
      - name: tranche_effectifs_unite_legale
        description: Workforce size band of the legal unit.
      - name: annee_effectifs_unite_legale
        description: Reference year for the legal unit workforce size band.
      - name: date_dernier_traitement_unite_legale
        description: Date and time of the latest Sirene processing for the legal unit.
      - name: date_debut
        description: Start date of the current legal unit period.
      - name: etat_administratif_unite_legale
        description: Administrative status of the legal unit.
      - name: activite_principale_unite_legale
        description: Principal activity code of the legal unit.
      - name: activite_principale_unite_legale_libelle
        description: Label of the principal activity code from the NAF reference seed.
      - name: categorie_juridique_unite_legale
        description: Legal category code of the legal unit.
      - name: categorie_juridique_unite_legale_libelle
        description: >
          Label of the legal category code from the INSEE Sirene legal category
          reference seed.
      - name: nic_siege_unite_legale
        description: NIC code of the legal unit head office establishment.
      - name: economie_sociale_solidaire_unite_legale
        description: >
          Flag indicating whether the legal unit belongs to the social and
          solidarity economy.
      - name: societe_mission_unite_legale
        description: Flag indicating whether the legal unit is a mission-driven company.
      - name: release_year
        description: Source file release year retained in the silver dataset.

